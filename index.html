  <script type="text/babel" data-presets="react">
    const {

    } = React;

    const {

    // ══════════════════════════════════════════════════════════
    // 常數
    // ══════════════════════════════════════════════════════════
    const SYSTEM_PROMPT_V12 = `# Role Definition
你是一位講話直白、重視落地執行的資深產品經理 (PM)。你討厭空泛的理論，擅長給出「明天就能執行」的具體建議。

# 核心任務
使用者將提供產品描述。請完成：
1. **題目設計**：產出 10 組 Kano 問卷題目。
2. **策略顧問**：針對每一題，根據其功能特性，預先撰寫「執行建議」與「修改方式」。
3. **判讀指南**：根據生成的 10 組題目，撰寫「專屬情境 AMIOR 判讀指南」。⚠️ 禁止使用通用定義，必須結合題目情境。
   **重要規則**：AMIOR 屬性判斷必須**單一且明確** (例如 "A 魅力品質")，**絕對禁止**出現 "A/O" 或 "M/R" 這類模糊寫法。

# 寫作風格 (Style Guide)
1. **白話文**：像同事在討論一樣，不要用教科書語氣。
2. **拒絕廢話**：不要說「這很重要所以要優化」，要說「把讀取時間壓在 2 秒內，不然玩家會直接關掉」。
3. **情境化**：
   - ❌ 錯誤：建議提升使用者體驗，增加滿意度。
   - ✅ 正確：針對「登入驗證碼」，建議增加「一鍵貼上」功能，減少輸入錯誤帶來的暴躁感。
4. **具體行動**：
   - ❌ 錯誤：優化介面設計。
   - ✅ 正確：將確認按鈕加大 20% 並改為顯眼的橘色 (#FF5722)，以防手指粗的使用者誤觸取消。

# Output JSON Structure (Strict)
請務必只回傳以下 JSON 格式，不要包含 Markdown 語法或任何其他文字：
{
  "questions": [
    {
      "id": 1,
      "feature": "功能簡述",
      "amior": "預測屬性 (A/O/M/I/R)",
      "categoryName": "屬性名稱",
      "reason": "屬性判斷理由...",
      "positive": "正向問句...",
      "negative": "反向問句...",
      "execution_advice": "【針對該功能的白話建議】",
      "modification_method": "【具體執行步驟】\\n1. 第一步做什麼\\n2. 第二步做什麼"
    }
  ],
  "guide": {
    "positive_analysis": [
       { "response": "我非常喜歡", "category": "A 魅力品質", "reason": "..." },
       { "response": "我期望如此", "category": "O 期望品質", "reason": "..." },
       { "response": "無所謂", "category": "I 無感品質", "reason": "..." },
       { "response": "可以接受", "category": "M 基本品質", "reason": "..." },
       { "response": "無法接受", "category": "R 反向品質", "reason": "..." }
    ],
    "negative_analysis": [
       { "response": "我非常喜歡", "category": "R 反向品質", "reason": "..." },
       { "response": "我期望如此", "category": "R 反向品質", "reason": "..." },
       { "response": "無所謂", "category": "A 魅力品質", "reason": "..." },
       { "response": "可以接受", "category": "O 期望品質", "reason": "..." },
       { "response": "無法接受", "category": "M 基本品質", "reason": "..." }
    ]
  }
}`;

    const CATEGORY_COLORS = { A: '#3B82F6', O: '#F97316', M: '#EF4444', I: '#64748B', R: '#10B981', Q: '#8B5CF6' };
    const LINE_COLORS = { A: '#93C5FD', O: '#FDBA74', M: '#FCA5A5', I: '#94A3B8', R: '#86EFAC' };
    const CATEGORY_NAMES = { A: '魅力屬性 (Attractive)', O: '期望屬性 (One-dimensional)', M: '基本屬性 (Must-be)', I: '無差異屬性 (Indifferent)', R: '反向屬性 (Reverse)', Q: '疑問結果 (Questionable)' };
    const SHORT_NAMES = { A: '魅力 (A)', O: '期望 (O)', M: '基本 (M)', I: '無差異 (I)', R: '反向 (R)', Q: '疑問 (Q)' };

    const DEFAULT_GUIDE = {
      positive_analysis: [
        { response: '我非常喜歡', category: 'A 魅力品質', reason: '理由：超越預期，創造愉悅與驚喜。' },
        { response: '我期望如此', category: 'O 期望品質', reason: '理由：好的產品理應具備，多多益善。' },
        { response: '無所謂', category: 'I 無感品質', reason: '理由：非核心體驗，不在意是否存在。' },
        { response: '可以接受', category: 'M 基本品質', reason: '理由：基礎功能，有是應該的。' },
        { response: '無法接受', category: 'R 反向品質', reason: '理由：設計本身具有干擾性。' }
      ],
      negative_analysis: [
        { response: '我非常喜歡', category: 'R 反向品質', reason: '理由：若喜歡「沒有」，代表原設計干擾體驗。' },
        { response: '我期望如此', category: 'R 反向品質', reason: '理由：期望「沒有」，顯示功能可能是累贅。' },
        { response: '無所謂', category: 'A 魅力品質', reason: '理由：沒有也無所謂，代表僅是加分項。' },
        { response: '可以接受', category: 'O 期望品質', reason: '理由：勉強接受沒有，代表屬於期望範疇。' },
        { response: '無法接受', category: 'M 基本品質', reason: '理由：絕對不能接受沒有，這是基礎門檻。' }
      ]
    };

    const DEMO_DATA = {
      meta: { totalRespondents: 150, expectedQuestions: 5, analysisDate: new Date().toISOString().split('T')[0] },
      items: [
        { id: 'Q1', text: '角色施法時的華麗粒子特效', isPos: true, displayId: 'Q1', si: 0.72, dsi: -0.15, category: 'A', stats: { A: 90, O: 10, M: 5, I: 45, R: 0, Q: 0 }, answerCounts: { '我非常喜歡': 90, '我期望如此': 10, '無所謂': 45, '可以接受': 5, '無法接受': 0 } },
        { id: 'Q2', text: '遊戲讀取時間小於 3 秒', isPos: true, displayId: 'Q2', si: 0.80, dsi: -0.75, category: 'O', stats: { A: 20, O: 100, M: 20, I: 10, R: 0, Q: 0 }, answerCounts: { '我非常喜歡': 20, '我期望如此': 100, '無所謂': 10, '可以接受': 20, '無法接受': 0 } },
        { id: 'Q3', text: '斷線後自動重連功能', isPos: true, displayId: 'Q3', si: 0.25, dsi: -0.85, category: 'M', stats: { A: 5, O: 20, M: 100, I: 25, R: 0, Q: 0 }, answerCounts: { '我非常喜歡': 5, '我期望如此': 20, '無所謂': 25, '可以接受': 0, '無法接受': 100 } },
        { id: 'Q4', text: '每日登入領取少量金幣', isPos: true, displayId: 'Q4', si: 0.13, dsi: -0.13, category: 'I', stats: { A: 10, O: 10, M: 10, I: 100, R: 20, Q: 0 }, answerCounts: { '我非常喜歡': 10, '我期望如此': 10, '無所謂': 100, '可以接受': 10, '無法接受': 20 } },
        { id: 'Q5', text: '深色模式 (Dark Mode)', isPos: true, displayId: 'Q5', si: 0.65, dsi: -0.35, category: 'A', stats: { A: 60, O: 30, M: 10, I: 50, R: 0, Q: 0 }, answerCounts: { '我非常喜歡': 60, '我期望如此': 30, '無所謂': 50, '可以接受': 10, '無法接受': 0 } }
      ]
    };

    const RAW_CURVE_DATA = [
      { x: 0, m: 0, o: 0, a: 0.5, i: 0.5, r: 1 },
      { x: -0.1, m: 0.095, o: 0.1, a: 0.505, i: 0.5, r: 0.9 },
      { x: -0.2, m: 0.18, o: 0.2, a: 0.52, i: 0.5, r: 0.8 },
      { x: -0.3, m: 0.255, o: 0.3, a: 0.545, i: 0.5, r: 0.7 },
      { x: -0.4, m: 0.32, o: 0.4, a: 0.58, i: 0.5, r: 0.6 },
      { x: -0.5, m: 0.375, o: 0.5, a: 0.625, i: 0.5, r: 0.5 },
      { x: -0.6, m: 0.42, o: 0.6, a: 0.68, i: 0.5, r: 0.4 },
      { x: -0.7, m: 0.455, o: 0.7, a: 0.745, i: 0.5, r: 0.3 },
      { x: -0.8, m: 0.48, o: 0.8, a: 0.82, i: 0.5, r: 0.2 },
      { x: -0.9, m: 0.495, o: 0.9, a: 0.905, i: 0.5, r: 0.1 },
      { x: -1, m: 0.5, o: 1, a: 1, i: 0.5, r: 0 },
    ];

    // ══════════════════════════════════════════════════════════
    // Helpers
    // ══════════════════════════════════════════════════════════
    const callGeminiAPI = async (payload, apiKey) => {
      if (!apiKey || !apiKey.trim()) throw new Error('請先輸入有效的 Gemini API Key。');
      let delay = 1000;
      for (let i = 0; i < 5; i++) {
        try {
          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
            { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }
          );
          if (response.ok) return await response.json();
          const errorData = await response.json().catch(() => ({}));
          const errorMessage = errorData?.error?.message || `狀態碼 ${response.status}`;
          if (response.status >= 400 && response.status < 500) throw new Error(`API 請求錯誤: ${errorMessage}`);
          throw new Error(`伺服器暫時無回應: ${errorMessage}`);
        } catch (e) {
          if (e.message.includes('API 請求錯誤')) throw e;
          if (i === 4) throw e;
        }
        await new Promise(res => setTimeout(res, delay));
        delay *= 2;
      }
      throw new Error('無法連線至 AI 伺服器，請確認網路狀態或稍後再試。');
    };

    const normalizeAnswer = (raw) => {
      if (!raw) return '';
      const s = String(raw).trim();
      if (s.includes('無法') || s.includes('不喜歡') || s.includes('討厭')) return '無法接受';
      if (s.includes('喜歡')) return '我非常喜歡';
      if (s.includes('期望') || s.includes('理所當然') || s.includes('應該') || s.includes('當然')) return '我期望如此';
      if (s.includes('無所謂') || s.includes('沒差') || s.includes('無感')) return '無所謂';
      if (s.includes('接受') || s.includes('可以') || s.includes('忍受')) return '可以接受';
      return s;
    };

    const extractFeatureName = (rawText) => {
      if (!rawText) return '未命名功能';
      let text = String(rawText).trim();
      text = text.replace(/^[Qq]?\d+[\.:_：]?\s*/, '');
      const stripPrefixes = ['如果', '若能', '假如', '當您', '當', '關於', '針對', '對於', '請問您對', '您覺得', '是否', '具備', '提供', '擁有', '包含', '設計', '系統能', '遊戲能', '希望能', '想要'];
      let clean = text;
      let hasPrefix = true;
      while (hasPrefix) {
        hasPrefix = false;
        for (const p of stripPrefixes) {
          if (clean.startsWith(p)) { clean = clean.substring(p.length).trim(); hasPrefix = true; }
        }
      }
      const stripSuffixes = ['，您的感受是？', '，您覺得如何？', '，您的看法是？', '的感受是？', '您覺得如何？', '您的感受？', '？', '?', '...', '。', '呢？', '好嗎？', '可以嗎？'];
      for (const s of stripSuffixes) {
        if (clean.endsWith(s)) clean = clean.substring(0, clean.length - s.length).trim();
      }
      const separators = ['，', ',', '：', ':', '影響', '導致', '造成'];
      for (const sep of separators) {
        if (clean.includes(sep)) { clean = clean.split(sep)[0].trim(); }
      }
      clean = clean.replace(/[\(\)（）]/g, '');
      return clean;
    };

    const fileToBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
    });

    const getQuadrantCategory = (si, dsi, center = { x: -0.5, y: 0.5 }) => {
      if (si >= center.y && dsi >= center.x) return 'A';
      if (si >= center.y && dsi < center.x) return 'O';
      if (si < center.y && dsi >= center.x) return 'I';
      if (si < center.y && dsi < center.x) return 'M';
      return 'I';
    };

    // ══════════════════════════════════════════════════════════
    // 外部套件載入 Hook
    // ══════════════════════════════════════════════════════════
    const useExternalScripts = () => {
      const [loaded, setLoaded] = useState({ xlsx: !!window.XLSX, html2canvas: !!window.html2canvas, docx: !!window.docx });
      useEffect(() => {
        const tryLoad = (src, globalKey, stateKey) => {
          if (!window[globalKey]) {
            const s = document.createElement('script'); s.src = src; s.async = true;
            s.onload = () => setLoaded(prev => ({ ...prev, [stateKey]: true }));
            document.body.appendChild(s);
          } else {
            setLoaded(prev => ({ ...prev, [stateKey]: true }));
          }
        };
        tryLoad('https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js', 'XLSX', 'xlsx');
        tryLoad('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', 'html2canvas', 'html2canvas');
        tryLoad('https://unpkg.com/docx@7.8.2/build/index.js', 'docx', 'docx');
      }, []);
      return loaded;
    };

    // ══════════════════════════════════════════════════════════
    // 通知 Toast
    // ══════════════════════════════════════════════════════════
    const NotificationToast = ({ message, type, onClose }) => {
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, [onClose]);
      const bgClass = type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-blue-500';
      return (
        <div className={`fixed top-4 right-4 z-[10000] ${bgClass} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 animate-fade-in-down max-w-sm`}>
          <span className="shrink-0">{type === 'error' ? '⚠️' : type === 'success' ? '✅' : 'ℹ️'}</span>
          <p className="text-sm font-medium">{message}</p>
          <button onClick={onClose} className="ml-auto hover:bg-white/20 rounded-full p-1 text-sm">✕</button>
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════
    // 自訂散佈圖點（含 Force Simulation 引線）
    // ══════════════════════════════════════════════════════════
    const CustomScatterPoint = (props) => {
      const { cx, cy, payload } = props;
      if (!payload) return null;
      const color = CATEGORY_COLORS[getQuadrantCategory(payload.si, payload.dsi)] || CATEGORY_COLORS['I'];
      const { lx, ax, ly, ay, id } = payload;
      const SCALE = 400;
      const xOffset = (lx - ax) * SCALE * -1;
      const yOffset = (ly - ay) * SCALE * -1;
      const finalX = cx + xOffset;
      const finalY = cy + yOffset;
      const dist = Math.sqrt(xOffset * xOffset + yOffset * yOffset);
      return (
        <g>
          <circle cx={cx} cy={cy} r={5} fill={color} stroke="white" strokeWidth={1} />
          {dist > 10 && <line x1={cx} y1={cy} x2={finalX} y2={finalY} stroke="#94a3b8" strokeWidth={1} opacity={0.6} />}
          <text x={finalX} y={finalY} dy={4} fill="#0f172a" fontSize={11} fontWeight="bold" textAnchor="middle" style={{ textShadow: '0 0 3px white,0 0 3px white' }}>{id}</text>
        </g>
      );
    };

    // ══════════════════════════════════════════════════════════
    // 自訂 Tooltip
    // ══════════════════════════════════════════════════════════
    const CustomTooltip = ({ active, payload }) => {
      if (!active || !payload?.length) return null;
      const items = payload[0].payload.originalItems || [payload[0].payload];
      return (
        <div className="bg-white p-2 border border-slate-300 shadow-xl rounded text-xs z-[9999]">
          {items.map((item, idx) => (
            <div key={idx} className={idx > 0 ? 'mt-2 pt-2 border-t' : ''}>
              <span className="font-bold">{item.id}</span>
              <span className="ml-2 px-1 rounded text-white" style={{ backgroundColor: CATEGORY_COLORS[item.category] }}>{item.category}</span>
              <p>{item.text}</p>
              {item.designCategory && item.designCategory !== item.actualCategory && (
                <div className="mt-1 text-[10px] text-slate-500">設計: {item.designCategory} vs 實測: {item.actualCategory}</div>
              )}
            </div>
          ))}
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════
    // AMIOR 統計摘要
    // ══════════════════════════════════════════════════════════
    const AmiorStatsSummary = ({ amiorStats }) => {
      if (!amiorStats) return null;
      return (
        <div className="p-4 bg-slate-50 rounded-lg border border-slate-100 flex flex-wrap gap-4 items-center mb-6">
          <span className="font-bold text-sm text-slate-700">整體分佈：</span>
          {Object.entries(amiorStats).map(([key, count]) => (
            <div key={key} className="flex items-center gap-1.5">
              <div className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: CATEGORY_COLORS[key] }}></div>
              <span className="text-sm font-bold text-slate-700">{SHORT_NAMES[key]}: {count}題</span>
            </div>
          ))}
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════
    // AMIOR 判讀指南
    // ══════════════════════════════════════════════════════════
    const AmiorGuideSection = ({ guide }) => (
      <div className="mt-8 border-t border-slate-200 pt-6">
        <h4 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">💡 Kano 模型判讀指南</h4>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50 p-6 rounded-xl border border-slate-200 text-sm text-slate-700">
          <div className="space-y-3">
            <div className="font-bold text-slate-900 border-b pb-2 mb-2">正向題反應分析 (四屬性介紹)</div>
            {guide.positive_analysis.map((row, idx) => (
              <p key={idx}>{row.response} → <strong>（{row.category.split(' ')[0]}）</strong>
                <span className="text-slate-500 block text-xs mt-1">{String(row.reason)}</span>
              </p>
            ))}
          </div>
          <div className="space-y-3">
            <div className="font-bold text-slate-900 border-b pb-2 mb-2">反向題反應分析</div>
            {guide.negative_analysis.map((row, idx) => (
              <p key={idx}>{row.response} → <strong>（{row.category.split(' ')[0]}）</strong>
                <span className="text-slate-500 block text-xs mt-1">{String(row.reason)}</span>
              </p>
            ))}
          </div>
        </div>
      </div>
    );

    // ══════════════════════════════════════════════════════════
    // Kano 主圖（Recharts ComposedChart）
    // ══════════════════════════════════════════════════════════
    const SharedKanoChart = ({ height = 500, chartData }) => (
      <div className="kano-chart-visual" style={{ width: '100%', height, position: 'relative', backgroundColor: '#fff' }}>

    // ══════════════════════════════════════════════════════════

    const StageSection = ({ stage, children }) => {

    // ══════════════════════════════════════════════════════════
    // analyzeTextContext（情境分析）
    // ══════════════════════════════════════════════════════════
    const analyzeTextContext = (text) => {
      const t = (text || '').toLowerCase();
      const featureName = text ? text.replace(/^[Q\d\.:\s]+/, '').split(/[，,：:]/)[0].trim().substring(0, 15) : '此功能';
      const pick = (templates) => {
        let hash = 0;
        for (let i = 0; i < t.length; i++) hash = t.charCodeAt(i) + ((hash << 5) - hash);
        return templates[Math.abs(hash) % templates.length].replace(/\$\{name\}/g, featureName);
      };
      if (['字', '文字', '說明', '閱讀', '看不清', '太小', '模糊', '字體', '排版'].some(k => t.includes(k)))
        return { focus: '易讀性優化', solutions: pick(["目前「${name}」的字級設定可能低於 24pt，導致手機版閱讀困難。請直接調大字體並檢查對比度。", "背景與「${name}」的顏色過於接近。請在文字下方增加半透明黑色遮罩 (Alpha 0.6) 以提升辨識度。", "排版過於擁擠。請針對「${name}」增加行距 (Line Height) 至 1.25 倍，避免資訊糊在一起。"]) };
      if (['讀取', 'loading', '慢', '很久', '卡住', '轉圈', '下載', '熱更', '順暢', 'fps'].some(k => t.includes(k)))
        return { focus: '效能與讀取', solutions: pick(["請在執行「${name}」時加入動態進度條或趣味小語，降低玩家等待時的焦慮感。", "建議將「${name}」改為背景預載 (Preload)，避免玩家點擊當下才開始下載資源。", "檢查「${name}」是否在主線程執行了繁重運算。請改用 Coroutine 分幀處理，確保畫面不凍結。"]) };
      if (['抽', '機率', '運氣', '非酋', '保底', '卡池', 'ssr', 'ur', '掉落'].some(k => t.includes(k)))
        return { focus: '機率體驗', solutions: pick(["針對「${name}」加入「動態保底」機制：若前 N 次失敗，則第 N+1 次成功率大幅提升。", "請強化「${name}」成功時的視覺特效（如全螢幕閃光、震動），放大獲得稀有物品的爽感。", "建議直接在介面上顯示「${name}」的期望次數或機率，透明化資訊以管理玩家預期。"]) };
      if (['連線', '斷線', '伺服器', 'wifi', '4g', '網路', '延遲', 'ping'].some(k => t.includes(k)))
        return { focus: '連線穩定性', solutions: pick(["當「${name}」連線中斷時，請實作「靜默重連」機制，而非直接彈出錯誤視窗打斷體驗。", "針對弱網環境，請將「${name}」的封包資料進行壓縮，或優先傳送關鍵指令。", "請在「${name}」請求發出時立即鎖定按鈕狀態，防止玩家因延遲而重複點擊。"]) };
      if (['聲音', '音效', '音樂', 'bgm', '語音', '配音', '吵', '沒聲音'].some(k => t.includes(k)))
        return { focus: '聽覺回饋', solutions: pick(["「${name}」的音效可能與背景音樂頻率衝突。請使用 Side-chain 壓縮技術，在音效播放時自動壓低 BGM。", "操作成功時缺乏聽覺確認。請為「${name}」補上清脆、短促的正向回饋音效。", "請檢查 Audio Source 設定，確保「${name}」的優先級 (Priority) 設定正確，不會被環境音切斷。"]) };
      if (['金幣', '獎勵', '數量', '價格', '太貴', '不夠', '平衡', '數值', '太強', '太弱', '體力'].some(k => t.includes(k)))
        return { focus: '數值平衡', solutions: pick(["玩家反饋「${name}」門檻過高。請在前 20% 的遊戲進度中，下修消耗量或增加投放量。", "感受不到「${name}」的價值。建議增加首次獲得的額外加成，建立「買到賺到」的心理錨點。", "「${name}」的產出與消耗失衡。請檢查後期的回收機制 (Sink)，避免通貨膨脹。"]) };
      if (['按鈕', '找不到', '誤觸', '介面', 'ui', '顯示', '圖示', '位置', '顏色', '樣式', '版面'].some(k => t.includes(k)))
        return { focus: '介面設計', solutions: pick(["根據 Fitts's Law，請擴大「${name}」的點擊熱區 (Hitbox) 至少 1.5 倍，防止誤觸。", "「${name}」的層級過深不易被發現。建議將其拉至主介面，或增加紅點提示 (Red Dot)。", "請統一「${name}」的視覺語言（如顏色代表的意義），避免玩家產生認知混淆。"]) };
      if (['步驟', '麻煩', '繁瑣', '流程', '教學', '引導', '註冊', '登入', '操作'].some(k => t.includes(k)))
        return { focus: '操作流程', solutions: pick(["請針對「${name}」提供「一鍵完成」或「跳過動畫」的功能，目前步驟太繁瑣。", "請改用手指引導 (Hand Cursor) 直接帶領玩家執行一次「${name}」，避免文字引導。", "請檢視「${name}」的漏斗數據，在流失率最高的步驟加入激勵提示。"]) };
      return { focus: '功能體驗', solutions: `請重新檢視「${featureName}」的設計目標，嘗試 A/B Test 或增加更明確的說明文字。` };
    };

    const getSuggestion = (item) => {
      if (item.execution_advice && item.modification_method) {
        return { stage: item.category === 'M' ? 1 : (item.category === 'O' || item.category === 'A') ? 2 : 3, title: `針對「${item.feature || item.text}」的策略`, strategy: 'AI 專屬分析', desc: item.execution_advice, example: item.modification_method, displayTitle: item.text };
      }
      const { category, dsi, si, text } = item;
      const cleanText = extractFeatureName(text);
      const context = analyzeTextContext(cleanText);
      const makeAdvice = (u) => `${u}，${context.solutions}`;
      let strategyTitle = '', strategy = '', advice = '';
      if (category === 'M') { strategyTitle = `⛔ 核心阻礙 (${context.focus})`; strategy = '最高優先級修復'; advice = makeAdvice(`這是基本門檻 (DSI: ${dsi.toFixed(2)})，做不好玩家會直接流失`); }
      else if (category === 'O') { strategyTitle = `⚔️ 主要戰場 (${context.focus})`; strategy = '規格對標競品'; advice = makeAdvice(`這是提升滿意度的關鍵 (SI: ${si.toFixed(2)})，必須做得比競品更好`); }
      else if (category === 'A') { strategyTitle = `✨ 產品賣點 (${context.focus})`; strategy = '行銷資源放大'; advice = makeAdvice(`這是意料之外的驚喜 (SI: ${si.toFixed(2)})，值得投入行銷資源包裝`); }
      else if (category === 'I') { strategyTitle = `📉 資源黑洞 (${context.focus})`; strategy = '暫停開發投入'; advice = makeAdvice(`玩家對此無感，建議暫停開發投入，僅維持最低運作標準`); }
      else if (category === 'R') { strategyTitle = `⚠️ 反向干擾 (${context.focus})`; strategy = '移除或提供開關'; advice = makeAdvice(`此設計造成負面體驗 (DSI: ${dsi.toFixed(2)})，請考慮移除或提供關閉選項`); }
      else { strategyTitle = `❓ 需進一步釐清`; strategy = '質化訪談'; advice = makeAdvice(`數據分佈不明確，建議直接訪談用戶了解真實想法`); }
      return { stage: category === 'M' ? 1 : (category === 'O' || category === 'A') ? 2 : 3, title: strategyTitle, strategy, desc: advice, example: context.solutions, displayTitle: item.text };
    };

    // ══════════════════════════════════════════════════════════
    // SurveyPreview
    // ══════════════════════════════════════════════════════════
    const SurveyPreview = ({ data, guide }) => {
      const flattenedSurveyItems = useMemo(() => {
        if (!data?.items) return [];
        return [...data.items].sort((a, b) => (parseInt(String(a.id).replace(/\D/g, '')) || 0) - (parseInt(String(b.id).replace(/\D/g, '')) || 0))
          .map(item => ({ ...item, displayId: item.id, uniqueKey: item.id, typeLabel: item.isPos ? '正向題' : '反向題', badgeColor: item.isPos ? 'bg-green-100 text-green-700 border-green-200' : 'bg-red-100 text-red-700 border-red-200', questionText: item.text, rawCounts: item.answerCounts }));
      }, [data]);

      const amiorStats = useMemo(() => {
        if (!data?.items) return null;
        const counts = { A: 0, O: 0, M: 0, I: 0, R: 0 };
        data.items.forEach(q => { if (counts[q.category] !== undefined) counts[q.category]++; });
        return counts;
      }, [data]);

      if (data?.items?.length > 0) {
        return (
          <div className="max-w-4xl mx-auto py-8">

                <div className="mt-4 flex flex-wrap gap-4 text-xs font-bold text-slate-500">
                  {['M', 'O', 'A', 'I', 'R'].map(k => (
                    <div key={k} className="flex items-center gap-1">
                      <span className="w-3 h-3 rounded-full inline-block" style={{ background: CATEGORY_COLORS[k] }}></span> {SHORT_NAMES[k]}
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="space-y-6">
              <AmiorStatsSummary amiorStats={amiorStats} />
              {flattenedSurveyItems.map(item => (
                <div key={item.uniqueKey} className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 relative overflow-hidden">
                  <div className={`absolute left-0 top-0 bottom-0 w-1 ${item.isPos ? 'bg-green-500' : 'bg-red-500'}`}></div>
                  <div className="flex flex-col mb-4 pl-2">

                      <div className="flex items-center gap-3">

                        {item.designCategory && item.designCategory !== item.actualCategory && (

                        )}
                      </div>
                      <div className="flex gap-4 text-xs font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
                        <span className="text-blue-600">SI: {item.si?.toFixed(3) || 'N/A'}</span>
                        <span className="text-orange-600">DSI: {item.dsi?.toFixed(3) || 'N/A'}</span>
                      </div>

                    <h3 className="font-bold text-slate-800 text-lg leading-relaxed mb-2">{item.questionText}</h3>

                      <div className="mb-4 p-3 bg-slate-50 rounded-lg border border-slate-100">

                          {['M', 'O', 'A', 'I', 'R'].map(k => (
                            <div key={k} className="flex items-center gap-1.5">
                              <div className="w-2.5 h-2.5 rounded-full shadow-sm" style={{ backgroundColor: CATEGORY_COLORS[k] }}></div>
                              <span className="text-sm font-bold text-slate-700 font-mono tracking-wide">{k}: {item.stats[k] || 0}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              ))}
              <AmiorGuideSection guide={guide || DEFAULT_GUIDE} />

      return (
        <div className="flex flex-col items-center justify-center h-full text-slate-400 gap-4 py-20">
          <span style={{ fontSize: 64, opacity: 0.2 }}>ℹ️</span>
          <p>目前無數據，請先在「圖表看板」上傳 Excel 數據或使用範例數據。</p>

    // ══════════════════════════════════════════════════════════
    // KanoQuestionGenerator
    // ══════════════════════════════════════════════════════════
    const KanoQuestionGenerator = ({ showNotification, generatorState, setGeneratorState }) => {
      const { apiKey = '', files, description, prompt, generatedQuestions, generatedGuide } = generatorState;
      const [isGenerating, setIsGenerating] = useState(false);
      const [refineTarget, setRefineTarget] = useState('1');
      const [refineInstruction, setRefineInstruction] = useState('');
      const [isRefining, setIsRefining] = useState(false);
      const [analyzingStep, setAnalyzingStep] = useState('');
      const [showScreenshotModal, setShowScreenshotModal] = useState(false);
      const projectInputRef = useRef(null);

      const handleFileChange = (e) => {
        if (!e.target.files) return;
        const newFiles = Array.from(e.target.files).map(file => ({
          id: Math.random().toString(36).substr(2, 9), file,
          url: URL.createObjectURL(file), type: file.type.startsWith('video') ? 'video' : 'image'
        }));
        setGeneratorState(prev => ({ ...prev, files: [...prev.files, ...newFiles] }));
      };
      const removeFile = (id) => setGeneratorState(prev => ({ ...prev, files: prev.files.filter(f => f.id !== id) }));

      const generateQuestions = async () => {
        if (!apiKey.trim()) { showNotification('請先輸入 Gemini API Key', 'error'); return; }
        if (!description.trim() && files.length === 0) { showNotification('請輸入描述或上傳圖片/影片，以便系統進行分析', 'error'); return; }
        setIsGenerating(true); setAnalyzingStep('分析內容中 (呼叫 AI)...');
        try {
          let payload;
          if (files.length > 0) {
            const parts = [{ text: `[System Instruction]\n${prompt}\n\n[User Request]\n${description || '請根據提供的圖片/影片生成題目。'}` }];
            for (const f of files) {
              try { parts.push({ inlineData: { mimeType: f.file.type, data: await fileToBase64(f.file) } }); }
              catch (e) { console.warn('Failed to convert file:', f.file.name); }
            }
            payload = { contents: [{ role: 'user', parts }] };
          } else {
            payload = { contents: [{ parts: [{ text: description || '請生成問卷題目' }] }], systemInstruction: { parts: [{ text: prompt }] } };
          }
          const resultData = await callGeminiAPI(payload, apiKey);
          const generatedText = resultData.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!generatedText) throw new Error('No text generated in response');
          let cleanText = generatedText.replace(/```json\n?/ig, '').replace(/```\n?/g, '').trim();
          let parsedData = {};
          try { parsedData = JSON.parse(cleanText); }
          catch { const m = cleanText.match(/\{[\s\S]*\}/) || cleanText.match(/\[[\s\S]*\]/); if (m) parsedData = JSON.parse(m[0]); else throw new Error('Invalid JSON format from AI'); }
          let newQuestions = [], newGuide = null;
          if (Array.isArray(parsedData)) newQuestions = parsedData;
          else if (parsedData.questions) { newQuestions = parsedData.questions; newGuide = parsedData.guide; }
          if (!Array.isArray(newQuestions)) throw new Error('AI returned unexpected format');
          setGeneratorState(prev => ({ ...prev, generatedQuestions: newQuestions, generatedGuide: newGuide }));
          showNotification(`成功生成 ${newQuestions.length} 組題目！`, 'success');
        } catch (error) { console.error(error); showNotification(`生成失敗：${error.message}`, 'error'); }
        finally { setIsGenerating(false); setAnalyzingStep(''); }
      };

      const handleRefineQuestion = async () => {
        if (!apiKey.trim()) { showNotification('請先輸入 Gemini API Key', 'error'); return; }
        if (!refineInstruction.trim()) { showNotification('請輸入優化需求', 'error'); return; }
        setIsRefining(true);
        try {
          const isAll = refineTarget === 'ALL';
          const stdJSON = JSON.stringify(['我非常喜歡', '我期望如此', '無所謂', '可以接受', '無法接受']);
          const commonGuidePrompt = `\n2. 根據新題目組合，重新撰寫「Kano 模型判讀指南」(Guide)。\n   **重要規範**：guide 物件必須包含 positive_analysis 和 negative_analysis 兩個陣列，各嚴格包含以下 5 個標準回答：${stdJSON}\n   每個回答物件需包含 response, category, reason。category 必須明確且單一，禁止出現 "A/O" 等模糊寫法。\n`;
          let refinePrompt = '';
          if (isAll) {
            refinePrompt = `# Role\n你是資深產品經理 (PM)。\n# Task\n請根據使用者的需求，**一次修改所有** Kano 問卷題目。${commonGuidePrompt}\n# Current Questions\n${JSON.stringify(generatedQuestions, null, 2)}\n\n# Output Format (Strict JSON)\n{"questions":[...],"guide":{...}}`;
          } else {
            const targetIndex = generatedQuestions.findIndex(q => String(q.id) === String(refineTarget));
            if (targetIndex === -1) throw new Error('找不到該題目 ID，請確認題號');
            refinePrompt = `# Role\n你是資深產品經理 (PM)。\n# Task\n1. 根據使用者的需求，修改指定的 Kano 問卷題目。${commonGuidePrompt}\n# Target Question\n${JSON.stringify(generatedQuestions[targetIndex], null, 2)}\n# Full Question Context\n${JSON.stringify(generatedQuestions, null, 2)}\n\n# Output Format (Strict JSON)\n{"refinedQuestion":{...},"guide":{...}}`;
          }
          const payload = { contents: [{ parts: [{ text: `修改需求：${refineInstruction}` }] }], systemInstruction: { parts: [{ text: refinePrompt }] } };
          const resultData = await callGeminiAPI(payload, apiKey);
          const generatedText = resultData.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!generatedText) throw new Error('No text generated in response');
          let cleanText = generatedText.replace(/```json\n?/ig, '').replace(/```\n?/g, '').trim();
          let result = {};
          try { result = JSON.parse(cleanText); }
          catch { const m = cleanText.match(/\{[\s\S]*\}/); if (m) result = JSON.parse(m[0]); else throw new Error('Invalid JSON format from AI'); }
          const isValidGuide = g => g && Array.isArray(g.positive_analysis) && g.positive_analysis.length === 5 && Array.isArray(g.negative_analysis) && g.negative_analysis.length === 5;
          const finalGuide = isValidGuide(result.guide) ? result.guide : (generatedGuide || DEFAULT_GUIDE);
          if (isAll) {
            if (!result.questions || !Array.isArray(result.questions)) throw new Error("AI response missing valid 'questions' array");
            setGeneratorState(prev => ({ ...prev, generatedQuestions: result.questions, generatedGuide: finalGuide }));
            showNotification('全體題目優化完成！', 'success');
          } else {
            if (!result.refinedQuestion) throw new Error("AI response missing 'refinedQuestion'");
            const targetIndex = generatedQuestions.findIndex(q => String(q.id) === String(refineTarget));
            if (targetIndex !== -1) {
              const newQs = [...generatedQuestions]; result.refinedQuestion.id = generatedQuestions[targetIndex].id; newQs[targetIndex] = result.refinedQuestion;
              setGeneratorState(prev => ({ ...prev, generatedQuestions: newQs, generatedGuide: finalGuide }));
              showNotification(`題目 ${refineTarget} 優化完成！`, 'success');
            }
          }
          setRefineInstruction('');
        } catch (error) { console.error(error); showNotification(`優化失敗：${error.message}`, 'error'); }
        finally { setIsRefining(false); }
      };

      const saveProject = () => {
        const data = { description, prompt, generatedQuestions, generatedGuide, timestamp: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `Kano_Generator_Project_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        showNotification('專案儲存成功', 'success');
      };

      const loadProject = (e) => {
        const file = e.target.files?.[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const d = JSON.parse(evt.target.result);
            setGeneratorState(prev => ({ ...prev, description: d.description || '', prompt: d.prompt || SYSTEM_PROMPT_V12, generatedQuestions: d.generatedQuestions || [], generatedGuide: d.generatedGuide || null }));
            showNotification('專案讀取成功！', 'success');
          } catch { showNotification('讀取失敗：格式錯誤', 'error'); }
        };
        reader.readAsText(file);
      };

      const exportToExcel = () => {
        if (!generatedQuestions.length) { showNotification('無題目可匯出', 'error'); return; }
        if (!window.XLSX) { showNotification('Excel 元件尚未載入完成，請稍後再試', 'error'); return; }
        try {
          const ws1data = [['題組', '功能情境', 'AMIOR 分類', '心理理由', '正向問句', '反向問句'], ...generatedQuestions.map(q => [q.id, q.feature, `${q.amior} (${q.categoryName})`, q.reason, q.positive, q.negative])];
          const ws2data = [['題號', '功能特徵', '正向題目', '反向題目'], ...generatedQuestions.map((q, i) => [`Q${i + 1}`, q.feature, q.positive, q.negative])];
          const wb = window.XLSX.utils.book_new();
          window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(ws1data), '題目設計總覽');
          window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(ws2data), '題型');
          window.XLSX.writeFile(wb, `Kano_Questions_Design_${new Date().toISOString().split('T')[0]}.xlsx`);
          showNotification('Excel 匯出成功！', 'success');
        } catch (error) { console.error(error); showNotification('Excel 匯出失敗', 'error'); }
      };

      const exportToWord = async () => {
        if (!generatedQuestions.length) { showNotification('無題目可匯出', 'error'); return; }
        if (!window.docx) { showNotification('Word 產生套件尚未載入，請稍後再試', 'error'); return; }
        try {
          const { Document, Packer, Paragraph } = window.docx;
          const children = []; let n = 1;
          generatedQuestions.forEach(q => {
            children.push(new Paragraph({ text: `${n}. ${q.positive} *` }));
            ['A. 我非常喜歡', 'B. 我期望如此', 'C. 無所謂', 'D. 可以接受', 'E. 無法接受'].forEach(opt => children.push(new Paragraph({ text: opt })));
            children.push(new Paragraph({ text: '' })); n++;
            children.push(new Paragraph({ text: `${n}. ${q.negative} *` }));
            ['A. 我非常喜歡', 'B. 我期望如此', 'C. 無所謂', 'D. 可以接受', 'E. 無法接受'].forEach(opt => children.push(new Paragraph({ text: opt })));
            children.push(new Paragraph({ text: '' })); n++;
          });
          const doc = new Document({ sections: [{ properties: {}, children }] });
          const blob = await Packer.toBlob(doc);
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = `Kano_Survey_For_Forms_${new Date().toISOString().split('T')[0]}.docx`;
          document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
          showNotification('Word 匯出成功！請直接上傳至 Forms', 'success');
        } catch (error) { console.error(error); showNotification('Word 匯出失敗', 'error'); }
      };

      const amiorStats = useMemo(() => {
        if (!generatedQuestions?.length) return null;
        const counts = { A: 0, O: 0, M: 0, I: 0, R: 0 };
        generatedQuestions.forEach(q => { if (counts[q.amior] !== undefined) counts[q.amior]++; });
        return counts;
      }, [generatedQuestions]);

      const guide = generatedGuide || DEFAULT_GUIDE;

      return (
        <div className="flex flex-col gap-6">
          {/* 上方兩欄 */}
          <div className="flex flex-col lg:flex-row gap-6 shrink-0">
            {/* 左：素材+描述 */}
            <div className="flex-1 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden">
              <h3 className="font-bold mb-3 flex items-center gap-2 text-slate-800 text-sm">🖼️ 1. 上傳素材 (圖片/影片)</h3>
              <div className="border-2 border-dashed border-slate-200 rounded-xl p-4 text-center hover:bg-slate-50 transition relative mb-4 shrink-0">
                <input type="file" multiple onChange={handleFileChange} accept="image/*,video/*" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                <div className="flex flex-col items-center gap-1">
                  <div className="p-2 bg-blue-50 rounded-full text-blue-500 text-xl">📎</div>
                  <p className="text-xs font-medium text-slate-600">點擊或拖曳上傳多個檔案</p>
                </div>
              </div>
              {files.length > 0 && (
                <div className="flex gap-2 mb-4 overflow-x-auto pb-2 shrink-0 h-24 custom-scrollbar">
                  {files.map(file => (
                    <div key={file.id} className="relative group w-24 h-20 rounded-lg overflow-hidden border border-slate-200 bg-slate-100 shrink-0">
                      {file.type === 'video' ? <video src={file.url} className="w-full h-full object-cover" /> : <img src={file.url} alt="preview" className="w-full h-full object-cover" />}
                      <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                        <button onClick={() => removeFile(file.id)} className="p-1.5 bg-red-500 text-white rounded-full hover:bg-red-600 text-xs">✕</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              <h3 className="font-bold mb-2 flex items-center gap-2 text-slate-800 text-sm mt-auto">ℹ️ 2. 內容描述 (關鍵)</h3>
              <textarea className="w-full border border-slate-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none h-32 resize-none" placeholder="請描述玩法、介面大綱" value={description} onChange={e => setGeneratorState(prev => ({ ...prev, description: e.target.value }))}></textarea>
            </div>

            {/* 右：AI 設定 */}
            <div className="lg:w-[480px] bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden">
              <h3 className="font-bold mb-3 flex items-center gap-2 text-slate-800 text-sm">🪄 3. AI 題目生成設定</h3>
              <div className="flex gap-2 mb-4 shrink-0">
                <button onClick={saveProject} className="flex-1 bg-slate-100 text-slate-600 px-3 py-2 rounded-lg text-xs font-bold hover:bg-slate-200 flex items-center justify-center gap-2 border border-slate-200">💾 儲存專案</button>
                <div className="flex-1 relative">
                  <input type="file" ref={projectInputRef} onChange={loadProject} accept=".json" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                  <button className="w-full h-full bg-slate-100 text-slate-600 px-3 py-2 rounded-lg text-xs font-bold hover:bg-slate-200 flex items-center justify-center gap-2 border border-slate-200">📂 讀取專案</button>
                </div>
              </div>
              <div className="mb-4 flex flex-col shrink-0">
                <label className="text-xs font-bold text-slate-700 block mb-2 flex items-center gap-1">
                  🔑 Gemini API Key <span className="text-red-500 ml-auto">*必填</span>
                </label>
                <input type="password" className="w-full border border-slate-300 bg-slate-50 text-slate-700 rounded-lg p-2 text-xs focus:ring-2 focus:ring-purple-500 focus:outline-none"
                  placeholder="請輸入 Google Gemini API Key" value={apiKey}
                  onChange={e => { const k = e.target.value; setGeneratorState(prev => ({ ...prev, apiKey: k })); try { localStorage.setItem('gemini_api_key', k); } catch { } }} />
              </div>
              <div className="mb-4 flex-1 flex flex-col min-h-0">
                <label className="text-xs font-bold text-slate-700 block mb-2 shrink-0">定義提詞 (Prompt)</label>
                <textarea className="w-full border border-slate-300 bg-slate-50 text-slate-500 rounded-lg p-3 text-xs focus:ring-2 focus:ring-purple-500 focus:outline-none flex-1 resize-none"
                  value={prompt} onChange={e => setGeneratorState(prev => ({ ...prev, prompt: e.target.value }))}></textarea>
              </div>
              <button onClick={generateQuestions} disabled={isGenerating}
                className={`w-full py-3 rounded-lg font-bold text-white shadow-sm flex items-center justify-center gap-2 transition shrink-0 ${isGenerating ? 'bg-slate-400 cursor-not-allowed' : 'bg-gradient-to-r from-blue-600 to-purple-600 hover:opacity-90'}`}>
                {isGenerating ? <>{analyzingStep || '分析圖片與描述中...'}</> : <>⚡ 根據內容生成題目</>}
              </button>
            </div>
          </div>

          {/* 生成結果預覽 */}
          <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
            <div className="flex justify-between items-center mb-4 shrink-0 border-b pb-4">
              <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2">📊 生成結果預覽</h3>
              {generatedQuestions.length > 0 && (
                <div className="flex gap-2 flex-wrap">
                  <button onClick={exportToExcel} className="text-sm bg-green-100 text-green-700 px-3 py-1.5 rounded-lg hover:bg-green-200 font-bold flex items-center gap-2 transition">⬇️ 匯出 Excel</button>
                  <button onClick={exportToWord} className="text-sm bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg hover:bg-indigo-200 font-bold flex items-center gap-2 transition">📄 匯出 Word (Forms)</button>
                  <button onClick={() => setShowScreenshotModal(true)} className="text-sm bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-200 font-bold flex items-center gap-2 transition">👁 題目總覽 (截圖用)</button>
                </div>
              )}
            </div>

            {generatedQuestions.length > 0 ? (
              <div className="flex flex-col gap-6">
                <AmiorStatsSummary amiorStats={amiorStats} />
                <div className="grid grid-cols-1 gap-4">
                  {generatedQuestions.flatMap((q, idx) => [
                    { ...q, type: 'positive', label: '正向題', text: q.positive, seqId: idx * 2 + 1, badgeColor: 'bg-green-600', groupID: q.id },
                    { ...q, type: 'negative', label: '反向題', text: q.negative, seqId: idx * 2 + 2, badgeColor: 'bg-red-600', groupID: q.id }

                      className={`p-5 rounded-xl border transition-all cursor-pointer relative group ${String(refineTarget) === String(item.groupID) ? 'bg-indigo-50 border-indigo-500 ring-1 ring-indigo-500 shadow-md' : 'bg-slate-50 border-slate-200 hover:shadow-md'}`}>
                      <div className="font-bold text-slate-800 mb-2 flex flex-wrap items-center gap-2">

                        <p className="text-slate-900 text-base font-bold mb-2">{item.text}</p>
                        <div className="text-sm text-slate-600 bg-slate-100 p-3 rounded-lg border border-slate-200 mt-2">
                          <span className="font-extrabold text-blue-700">{String(item.amior)}</span>
                          <span className="font-bold text-slate-700">（{String(item.categoryName)}）</span>：{String(item.reason)}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

                {/* AI 優化列 */}
                <div className="shrink-0 bg-indigo-50 border border-indigo-100 rounded-xl p-4 flex flex-col md:flex-row gap-4 items-center">
                  <div className="flex items-center gap-2 shrink-0">
                    <div className="p-2 bg-indigo-100 rounded-full text-indigo-600 text-lg">🔄</div>
                    <div><h4 className="font-bold text-indigo-900 text-sm">AI 題目優化</h4></div>
                  </div>
                  <div className="flex-1 flex gap-2 w-full items-center">
                    <div className="flex items-center gap-2">
                      <div className={`px-3 py-2 rounded-lg text-sm font-bold whitespace-nowrap ${refineTarget === 'ALL' ? 'bg-purple-100 text-purple-700' : 'bg-indigo-100 text-indigo-700'}`}>
                        {refineTarget === 'ALL' ? '針對：全體題目' : `針對：題組 ${refineTarget}`}
                      </div>
                      <button onClick={() => setRefineTarget(prev => prev === 'ALL' ? '1' : 'ALL')} className="text-xs text-slate-500 underline hover:text-slate-700 whitespace-nowrap">
                        {refineTarget === 'ALL' ? '改為單題' : '切換全體'}
                      </button>
                    </div>
                    <input type="text" className="bg-white border border-indigo-200 text-gray-900 text-sm rounded-lg block w-full p-2.5"
                      placeholder="請輸入修改需求" value={refineInstruction} onChange={e => setRefineInstruction(e.target.value)} />
                  </div>
                  <button onClick={handleRefineQuestion} disabled={isRefining}
                    className={`text-white bg-indigo-600 hover:bg-indigo-700 font-medium rounded-lg text-sm px-5 py-2.5 ${isRefining ? 'opacity-70 cursor-wait' : ''} whitespace-nowrap`}>
                    {isRefining ? '優化中...' : '重新生成'}
                  </button>
                </div>

                <AmiorGuideSection guide={guide} />
              </div>
            ) : (
              <div className="flex-1 flex flex-col items-center justify-center text-slate-400 gap-4 py-16">
                <span style={{ fontSize: 64, opacity: 0.2 }}>🔍</span>
                <p>請先在上方輸入描述並點擊生成</p>
              </div>
            )}
          </div>

          {/* 截圖 Modal */}
          {showScreenshotModal && (
            <div className="fixed inset-0 z-[9999] bg-black/50 flex items-center justify-center p-4" onClick={() => setShowScreenshotModal(false)}>
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                <div className="p-4 border-b flex justify-between items-center bg-slate-50">
                  <h3 className="font-bold text-lg">題目設計總覽 (截圖模式)</h3>
                  <button onClick={() => setShowScreenshotModal(false)} className="p-2 hover:bg-slate-200 rounded-full">✕</button>
                </div>
                <div className="p-8 overflow-auto bg-white">
                  <table className="w-full text-left border-collapse">
                    <thead><tr className="border-b-2 border-slate-800">
                      <th className="p-3 font-bold text-slate-900 w-16">編號</th>
                      <th className="p-3 font-bold text-slate-900 w-1/4">功能情境</th>
                      <th className="p-3 font-bold text-slate-900">正向問句</th>
                      <th className="p-3 font-bold text-slate-900">反向問句</th>
                    </tr></thead>
                    <tbody>
                      {generatedQuestions.map((q, idx) => (
                        <tr key={idx} className="border-b border-slate-200">
                          <td className="p-3 font-bold text-slate-700">{q.id}</td>
                          <td className="p-3 text-slate-800 font-medium">{q.feature}</td>
                          <td className="p-3 text-slate-600">{q.positive}</td>
                          <td className="p-3 text-slate-600">{q.negative}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════
    // 主 App
    // ══════════════════════════════════════════════════════════
    const App = () => {
      const loaded = useExternalScripts();
      const [data, setData] = useState({ meta: { totalRespondents: 0, expectedQuestions: 0, analysisDate: new Date().toISOString().split('T')[0] }, items: [] });
      const [viewMode, setViewMode] = useState('generator');
      const [sortMode, setSortMode] = useState('id');
      const [notification, setNotification] = useState(null);
      const [generatorState, setGeneratorState] = useState(() => {
        let storedKey = '';
        try { storedKey = localStorage.getItem('gemini_api_key') || ''; } catch { }
        return { apiKey: storedKey, files: [], description: '', prompt: SYSTEM_PROMPT_V12, generatedQuestions: [], generatedGuide: null };
      });
      const [reportTitle, setReportTitle] = useState('');
      const [projectName, setProjectName] = useState('');
      const [author, setAuthor] = useState('');
      const [reportDate, setReportDate] = useState(new Date().toISOString().split('T')[0]);
      const [summaryHighlights, setSummaryHighlights] = useState('');
      const [analysisReason, setAnalysisReason] = useState('');
      const [improvementItems, setImprovementItems] = useState([]);
      const fileInputRef = useRef(null);
      const reportRef = useRef(null);
      const chartCenter = { x: -0.5, y: 0.5 };
      const guide = generatorState.generatedGuide || DEFAULT_GUIDE;

      const showNotification = (msg, type = 'info') => setNotification({ message: msg, type });

      useEffect(() => {
        if (data?.items?.length > 0) generateAutoContent(data);
      }, [data]);

      const loadDemoData = () => { setData(DEMO_DATA); showNotification('範例數據載入成功！', 'success'); };

      const generateAutoContent = (currentData) => {
        if (!currentData.items?.length) return;
        const items = currentData.items;
        const totalQ = items.length;
        const count = { A: 0, O: 0, M: 0, I: 0, R: 0, Q: 0 };
        items.forEach(i => { if (count[i.category] !== undefined) count[i.category]++; });
        const pct = n => totalQ === 0 ? '0%' : `${Math.round(n / totalQ * 100)}%`;
        const allSortedItems = [...items].sort((a, b) => {
          const priority = { M: 1, O: 2, A: 2, I: 3, R: 3, Q: 4 };
          const diff = (priority[a.category] || 9) - (priority[b.category] || 9);
          return diff !== 0 ? diff : Math.abs(b.dsi) - Math.abs(a.dsi);
        });
        const maxCat = Object.keys(count).reduce((a, b) => count[a] > count[b] ? a : b);
        const summaryLines = [];
        summaryLines.push(`1）分佈總覽：\n  本次分析共 ${totalQ} 題，以「${CATEGORY_NAMES[maxCat].split(' ')[0]}」佔比最高 (${count[maxCat]}題, ${pct(count[maxCat])})。`);
        const mList = items.filter(i => i.category === 'M').map(i => i.id).join('、') || '無';
        const oList = items.filter(i => i.category === 'O').map(i => i.id).join('、') || '無';
        const aList = items.filter(i => i.category === 'A').map(i => i.id).join('、') || '無';
        summaryLines.push(`2）關鍵屬性：\n  ・基本(M)：${mList} (避免不滿的底線)\n  ・期望(O)：${oList} (提升滿意度的主力)\n  ・魅力(A)：${aList} (差異化亮點)`);
        if (count.M > 0) summaryLines.push(`3）優先行動：\n  基本需求(M)存在缺口，需最優先修復以止血，接著再優化期望需求(O)。`);
        else if (count.O > 0) summaryLines.push(`3）優先行動：\n  基礎功能穩固，建議集中資源在期望需求(O)的體驗優化。`);
        else summaryLines.push(`3）優先行動：\n  目前分佈較為平均，建議依照產品策略決定發展方向。`);
        setSummaryHighlights(summaryLines.join('\n\n'));
        let reason = '';
        if (count.M > totalQ * 0.3) reason += `1. 基礎建設期：\n超過 30% 為基本需求(M)，產品仍處於「補足基礎」階段，玩家對於基礎功能的完整性非常在意。\n\n`;
        else if (count.A > totalQ * 0.3) reason += `1. 創新紅利期：\n大量魅力需求(A)，顯示本次測試的功能（如特效、音效）帶給玩家許多驚喜，具有很好的行銷潛力。\n\n`;
        else reason += `1. 體驗優化期：\n分佈均衡或以期望需求(O)為主，戰場在於「做得比競品更好」，細節打磨是關鍵。\n\n`;
        setAnalysisReason(reason);
        setImprovementItems(allSortedItems);
      };

      const groupedImprovementItems = useMemo(() =>
        improvementItems.map(item => {
          const s = getSuggestion(item);
          return { stage: s.stage, title: s.title, strategy: s.strategy, desc: s.desc, example: s.example, displayTitle: s.displayTitle, idList: [item.id], items: [item], category: item.category };
        }).sort((a, b) => a.stage - b.stage),
        [improvementItems]);

      const activeStages = useMemo(() =>
        [1, 2, 3].filter(stage => groupedImprovementItems.some(g => g.stage === stage)),
        [groupedImprovementItems]);

      // Excel 上傳
      const handleFileUpload = (e) => {
        const file = e.target.files?.[0]; if (!file) return;
        if (!loaded.xlsx) { showNotification('系統元件 (XLSX) 正在載入中，請稍後再試...', 'error'); return; }
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const bstr = evt?.target?.result;
            const wb = window.XLSX.read(bstr, { type: 'binary' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const wsDataArray = window.XLSX.utils.sheet_to_json(ws, { header: 1 });
            if (!wsDataArray || wsDataArray.length < 2) { showNotification('Excel 無有效數據 (Rows < 2)', 'error'); return; }
            const headers = wsDataArray[0]; const dataRows = wsDataArray.slice(1);
            const processedItems = [];
            const START_COL_INDEX = 6;
            let validQuestionCount = 0;
            const generatedList = generatorState.generatedQuestions || [];
            const currentGuide = generatorState.generatedGuide || DEFAULT_GUIDE;
            const guideLookup = { positive: {}, negative: {} };
            const getCatCode = str => (str || '').split(' ')[0].trim().toUpperCase();
            currentGuide.positive_analysis?.forEach(item => { guideLookup.positive[normalizeAnswer(item.response)] = getCatCode(item.category); });
            currentGuide.negative_analysis?.forEach(item => { guideLookup.negative[normalizeAnswer(item.response)] = getCatCode(item.category); });
            for (let i = START_COL_INDEX; i < headers.length; i++) {
              const header = headers[i]; if (!header) continue;
              const isNeg = validQuestionCount % 2 !== 0;
              let counts = { A: 0, M: 0, O: 0, I: 0, R: 0, Q: 0 }; let rawCounts = {};
              dataRows.forEach(row => {
                const ans = normalizeAnswer((row[i] || '').toString());
                rawCounts[ans] = (rawCounts[ans] || 0) + 1;
                const targetLookup = !isNeg ? guideLookup.positive : guideLookup.negative;
                const mappedCategory = targetLookup[ans];
                if (mappedCategory && counts[mappedCategory] !== undefined) counts[mappedCategory]++;
              });
              const validTotal = counts.A + counts.O + counts.M + counts.I + counts.R;
              const safeTotal = validTotal === 0 ? 1 : validTotal;
              const si = parseFloat(((counts.A + counts.O) / safeTotal).toFixed(3));
              const dsi = parseFloat(((counts.O + counts.M) / safeTotal * -1).toFixed(3));
              const calculatedCategory = getQuadrantCategory(si, dsi, chartCenter);
              const featureMatch = generatedList.find(q => header.includes(q.feature));
              const linkedQuestion = featureMatch || (generatedList[validQuestionCount] || null);
              const designCategory = linkedQuestion?.amior || null;
              processedItems.push({
                id: `Q${validQuestionCount + 1}`, text: header, isPos: !isNeg, displayId: `Q${validQuestionCount + 1}`,
                si, dsi, category: calculatedCategory, designCategory, actualCategory: calculatedCategory,
                stats: counts, answerCounts: rawCounts,
                execution_advice: linkedQuestion ? linkedQuestion.execution_advice : null,
                modification_method: linkedQuestion ? linkedQuestion.modification_method : null,
                feature: linkedQuestion ? linkedQuestion.feature : null
              });
              validQuestionCount++;
            }
            setData({ meta: { totalRespondents: dataRows.length, expectedQuestions: processedItems.length, analysisDate: new Date().toISOString().split('T')[0] }, items: processedItems });
            showNotification(`解析完成！(獨立題目模式) 共處理 ${processedItems.length} 個題目`, 'success');
          } catch (err) { console.error(err); showNotification('解析失敗：' + err.message, 'error'); }
        };
        reader.readAsBinaryString(file);
      };

      // Force Simulation chartData
      const chartData = useMemo(() => {
        if (!data.items.length) return [];
        const groupedMap = new Map();
        data.items.forEach(item => {
          const key = `${item.dsi.toFixed(4)}_${item.si.toFixed(4)}`;
          if (!groupedMap.has(key)) groupedMap.set(key, []);
          groupedMap.get(key).push(item);
        });
        const simulationNodes = Array.from(groupedMap.values()).map(items => {
          const firstItem = items[0];
          const sortedItems = [...items].sort((a, b) => (parseInt(String(a.displayId).replace(/\D/g, '')) || 0) - (parseInt(String(b.displayId).replace(/\D/g, '')) || 0));
          const label = sortedItems.map(i => i.displayId).join('、');
          return { ...firstItem, id: label, originalItems: sortedItems, x: firstItem.dsi, y: firstItem.si, ax: firstItem.dsi, ay: firstItem.si, lx: firstItem.dsi, ly: firstItem.si, vx: 0, vy: 0 };
        });
        const ITERATIONS = simulationNodes.length > 50 ? 40 : 120;
        const REPULSION = 0.005, ANCHOR_STRENGTH = 0.05, DOT_REPULSION = 0.02, COLLISION_RADIUS = 0.08, DOT_SAFE_RADIUS = 0.05;
        const anchors = simulationNodes.map(n => ({ x: n.ax, y: n.ay }));
        for (let i = 0; i < ITERATIONS; i++) {
          simulationNodes.forEach(node => {
            let fx = (node.ax - node.lx) * ANCHOR_STRENGTH, fy = (node.ay - node.ly) * ANCHOR_STRENGTH;
            simulationNodes.forEach(other => {
              if (node === other) return;
              const dx = node.lx - other.lx, dy = node.ly - other.ly, distSq = dx * dx + dy * dy;
              if (distSq < COLLISION_RADIUS * COLLISION_RADIUS && distSq > 0) { const d = Math.sqrt(distSq), force = (COLLISION_RADIUS - d) / d * REPULSION; fx += dx * force; fy += dy * force; }
            });
            anchors.forEach(anchor => {
              const dx = node.lx - anchor.x, dy = node.ly - anchor.y, distSq = dx * dx + dy * dy;
              if (distSq < DOT_SAFE_RADIUS * DOT_SAFE_RADIUS && distSq > 0) { const d = Math.sqrt(distSq), force = (DOT_SAFE_RADIUS - d) / d * DOT_REPULSION; fx += dx * force; fy += dy * force; }
            });
            const margin = 0.02;
            if (node.lx < -1 + margin) fx += 0.01; if (node.lx > 0 - margin) fx -= 0.01;
            if (node.ly < 0 + margin) fy += 0.01; if (node.ly > 1 - margin) fy -= 0.01;
            node.vx = (node.vx + fx) * 0.9; node.vy = (node.vy + fy) * 0.9; node.lx += node.vx; node.ly += node.vy;
          });
        }
        return simulationNodes.map(node => ({ ...node, labelX: node.lx, labelY: node.ly }));
      }, [data.items]);

      const sortedListItems = useMemo(() => {
        let sorted = [...data.items];
        if (sortMode === 'id') sorted.sort((a, b) => (parseInt(a.id.replace(/\D/g, '')) || 0) - (parseInt(b.id.replace(/\D/g, '')) || 0));
        else { const order = { A: 1, O: 2, M: 3, I: 4, R: 5, Q: 6 }; sorted.sort((a, b) => (order[a.category] || 99) - (order[b.category] || 99)); }
        return sorted;
      }, [data.items, sortMode]);

      const dashboardFlatItems = useMemo(() =>
        sortedListItems.map(item => ({ ...item, uniqueKey: item.id })),
        [sortedListItems]);

      // 匯出 HTML 報告
      const handleExportHTML = async () => {
        if (!data.items.length) { showNotification('無數據可匯出', 'error'); return; }
        if (viewMode !== 'report') { showNotification('請先切換至「報告預覽」分頁後再執行匯出', 'warning'); setViewMode('report'); return; }
        if (!reportRef.current) { showNotification('找不到報告元件', 'error'); return; }
        showNotification('正在產生 HTML 報告...', 'info');
        try {
          const chartElement = reportRef.current.querySelector('.kano-chart-visual');
          let chartImageBase64 = '';
          if (chartElement) {
            const canvas = await window.html2canvas(chartElement, { scale: 4, useCORS: true, logging: false, backgroundColor: '#ffffff' });
            chartImageBase64 = canvas.toDataURL('image/png');
          }
          const catRank = { A: 3, O: 2, M: 1, I: 4, R: 5, Q: 6 };
          const itemsHTML = sortedListItems.map(item => `
        <div class="question-card" data-id="${parseInt(item.displayId.replace(/\D/g, '')) || 0}" data-category-rank="${catRank[item.category] || 99}" style="display:flex;align-items:flex-start;gap:12px;padding:12px;background:#f8fafc;border-radius:8px;border:1px solid #f1f5f9;margin-bottom:8px;page-break-inside:avoid;">
          <div style="flex-shrink:0;"><span style="background:#e2e8f0;color:#334155;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:bold;min-width:36px;text-align:center;display:inline-block;">${item.displayId}</span></div>
          <div style="flex:1;min-width:0;">
            <div style="margin-bottom:4px;"><span style="background:${CATEGORY_COLORS[item.category]};color:white;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:bold;">${SHORT_NAMES[item.category]}</span></div>
            <p style="font-size:14px;color:#334155;line-height:1.625;font-weight:500;margin:0;word-break:break-word;">${item.text}</p>
          </div>
        </div>`).join('');
          const stagesHTML = [1, 2, 3].filter(stage => groupedImprovementItems.some(g => g.stage === stage)).map(stage => {
            const scfg = { 1: { title: '搞定基礎體驗', sub: '針對基本品質 (M)', icon: '🛡️', border: '#fecaca', bg: '#fef2f2', badgeBg: '#fecaca', badgeText: '#991b1b', stageLabel: '第一階段' }, 2: { title: '創造亮點與爽感', sub: '針對期望/魅力 (O & A)', icon: '🚀', border: '#fde68a', bg: '#fffbeb', badgeBg: '#fde68a', badgeText: '#92400e', stageLabel: '第二階段' }, 3: { title: '避免無效開發', sub: '針對無差異 (I)', icon: '✂️', border: '#a7f3d0', bg: '#ecfdf5', badgeBg: '#a7f3d0', badgeText: '#065f46', stageLabel: '第三階段' } };
            const sc = scfg[stage];
            const cardsHTML = groupedImprovementItems.filter(g => g.stage === stage).map(g => { const item = g.items[0]; return `<div style="background:white;border-radius:12px;border:1px solid #e2e8f0;padding:24px;margin-bottom:16px;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><span style="background:#1e293b;color:white;padding:2px 6px;border-radius:4px;font-size:12px;font-weight:bold;">${item.id}</span><span style="background:${CATEGORY_COLORS[item.category]};color:white;padding:2px 6px;border-radius:4px;font-size:12px;">${SHORT_NAMES[item.category]}</span></div><h3 style="font-size:16px;font-weight:bold;color:#1e293b;margin:0;">${item.text}</h3></div>`; }).join('');
            return `<div style="margin-bottom:40px;border-radius:12px;overflow:hidden;border:2px solid ${sc.border};"><div style="padding:24px;background:${sc.bg};border-bottom:2px solid ${sc.border};position:relative;"><div style="position:absolute;right:24px;top:24px;font-size:24px;">${sc.icon}</div><div style="display:inline-block;padding:4px 12px;border-radius:9999px;font-size:12px;font-weight:bold;background:${sc.badgeBg};color:${sc.badgeText};margin-bottom:8px;">${sc.stageLabel}</div><h2 style="font-size:24px;font-weight:bold;color:#1e293b;margin:4px 0;">${sc.title}</h2><p style="font-size:14px;color:#64748b;margin:0;">${sc.sub}</p></div><div style="padding:24px;background:rgba(248,250,252,0.5);">${cardsHTML}</div></div>`;
          }).join('');
          const htmlContent = `<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${reportTitle}</title><style>body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#334155;line-height:1.6;max-width:900px;margin:0 auto;padding:40px;background:#f8fafc;}.container{background:white;padding:40px;border-radius:16px;box-shadow:0 4px 6px -1px rgba(0,0,0,.1);}h1{color:#1e293b;font-size:32px;margin-bottom:16px;border-bottom:2px solid #4f46e5;padding-bottom:16px;}h2{color:#1e293b;font-size:24px;margin-top:40px;margin-bottom:24px;border-left:4px solid #10b981;padding-left:12px;}h3{color:#312e81;font-size:18px;margin-top:0;margin-bottom:12px;}.meta{display:grid;grid-template-columns:1fr 1fr;gap:16px;font-size:14px;color:#64748b;margin-bottom:40px;}.chart-img{max-width:100%;height:auto;}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;}.grid-col{padding:24px;}.bg-indigo-50{background-color:#eef2ff;}.border-r{border-right:1px solid #e2e8f0;}@media print{.stage-content,.grid-2{break-inside:avoid;}}@media(max-width:768px){.meta,.grid-2{grid-template-columns:1fr!important;}#question-list{grid-template-columns:1fr!important;}}</style><script>function sortQuestions(mode){const container=document.getElementById('question-list');const items=Array.from(container.children);items.sort((a,b)=>{if(mode==='id')return parseInt(a.dataset.id)-parseInt(b.dataset.id);const rA=parseInt(a.dataset.categoryRank),rB=parseInt(b.dataset.categoryRank);return rA!==rB?rA-rB:parseInt(a.dataset.id)-parseInt(b.dataset.id);});items.forEach(item=>container.appendChild(item));}<\/script></head><body><div class="container"><h1>${reportTitle}</h1><div class="meta"><p><strong>專案：</strong>${projectName}</p><p><strong>製作人：</strong>${author}</p><p><strong>日期：</strong>${reportDate}</p><p><strong>樣本數：</strong>${data.meta.totalRespondents}</p></div><h2>一、Kano 屬性分佈圖</h2><div style="background:white;border:1px solid #e2e8f0;border-radius:16px;padding:24px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.05);">${chartImageBase64 ? `<img src="${chartImageBase64}" class="chart-img" />` : '<p>(圖表匯出失敗)</p>'}</div><div style="margin-top:16px;background:white;border-radius:12px;border:1px solid #e2e8f0;padding:24px;"><div style="display:flex;gap:10px;margin-bottom:20px;justify-content:flex-end;"><button onclick="sortQuestions('id')" style="padding:6px 12px;background:#f1f5f9;border:1px solid #cbd5e1;border-radius:6px;font-size:12px;cursor:pointer;color:#475569;font-weight:bold;">依照題號排序</button><button onclick="sortQuestions('category')" style="padding:6px 12px;background:#f1f5f9;border:1px solid #cbd5e1;border-radius:6px;font-size:12px;cursor:pointer;color:#475569;font-weight:bold;">依照屬性排序</button></div><div id="question-list" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">${itemsHTML}</div></div><br/><br/><h2>二、總結與分析</h2><div class="grid-2"><div class="grid-col bg-indigo-50 border-r"><h3>📊 總結重點</h3><p style="font-size:14px;white-space:pre-wrap;">${summaryHighlights || '尚無數據可分析。'}</p></div><div class="grid-col"><h3>🧐 分析原因</h3><p style="font-size:14px;white-space:pre-wrap;">${analysisReason || '尚無數據可分析。'}</p></div></div><br/><br/><h2>三、優化教戰守則</h2>${stagesHTML || '<p style="color:#94a3b8;font-style:italic;">目前數據不足以生成優化建議。</p>'}<div style="margin-top:60px;text-align:center;color:#cbd5e1;font-size:12px;border-top:1px solid #f1f5f9;padding-top:20px;">工具製作者：李敏瑞</div></div></body></html>`;
          const blob = new Blob([htmlContent], { type: 'text/html' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = `Report_Kano_${reportDate}.html`;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          showNotification('HTML 匯出成功！', 'success');
        } catch (e) { console.error(e); showNotification('匯出失敗：' + e.message, 'error'); }
      };

      const navBtnClass = (mode) =>
        `px-4 py-2 rounded-lg text-sm font-bold transition flex items-center gap-2 ${viewMode === mode ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`;

      return (
        <div className="flex flex-col h-screen bg-slate-50 font-sans text-slate-900">
          {notification && <NotificationToast message={notification.message} type={notification.type} onClose={() => setNotification(null)} />}

          {/* 頂部導覽 */}
          <div className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
            <div className="flex gap-3 flex-wrap">
              <button onClick={() => setViewMode('generator')} className={navBtnClass('generator')}>🪄 題目產生器</button>
              <button onClick={() => setViewMode('dashboard')} className={navBtnClass('dashboard')}>圖表看板</button>
              <button onClick={() => setViewMode('survey')} className={navBtnClass('survey')}>✏️ 問卷填寫預覽</button>
              <button onClick={() => setViewMode('report')} className={navBtnClass('report')}>報告預覽</button>
              <button onClick={() => setViewMode('data')} className={navBtnClass('data')}>API 數據</button>
            </div>
            {viewMode === 'report' && (
              <button onClick={handleExportHTML} disabled={!loaded.html2canvas}
                className={`flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-bold transition shadow-sm ml-auto ${!loaded.html2canvas ? 'opacity-50 cursor-not-allowed' : ''}`}>
                📄 {!loaded.html2canvas ? '載入元件中...' : '匯出 HTML'}
              </button>
            )}
          </div>

          {/* 主內容 */}
          <div className="flex-1 overflow-auto p-6 scroll-smooth">
            {viewMode === 'generator' && <KanoQuestionGenerator showNotification={showNotification} generatorState={generatorState} setGeneratorState={setGeneratorState} />}
            {viewMode === 'survey' && <SurveyPreview data={data} guide={guide} />}

            {viewMode === 'dashboard' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                {/* 左欄 */}
                <div className="lg:col-span-1 space-y-6">
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 className="font-bold mb-4 flex items-center gap-2">📤 數據來源</h3>
                    <div className="border-2 border-dashed border-slate-200 rounded-xl p-8 text-center hover:bg-slate-50 transition relative">
                      <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".xlsx,.xls,.csv" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                      <div className="text-4xl text-slate-300 mb-3">🗃️</div>
                      <p className="text-sm font-medium text-slate-600">更新數據 (上傳 Excel)</p>
                      <p className="text-xs text-slate-400 mt-2">支援直接上傳 Sheet1 原始問卷檔</p>
                    </div>
                    <button onClick={loadDemoData} className="mt-3 w-full text-sm bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2 rounded-lg">載入範例數據</button>
                  </div>

                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 className="font-bold mb-4 flex items-center gap-2">⚙️ 報告設定</h3>
                    <div className="space-y-4">
                      {[['報告名稱', reportTitle, setReportTitle], ['專案名稱', projectName, setProjectName], ['製作人', author, setAuthor]].map(([l, v, s]) => (
                        <div key={l}><label className="text-xs font-bold text-slate-500 block mb-1">{l}</label><input type="text" value={v} onChange={e => s(e.target.value)} className="w-full border rounded px-3 py-2 text-sm bg-slate-50" /></div>
                      ))}
                      <div><label className="text-xs font-bold text-slate-500 block mb-1">日期</label><input type="date" value={reportDate} onChange={e => setReportDate(e.target.value)} className="w-full border rounded px-3 py-2 text-sm bg-slate-50" /></div>
                    </div>
                  </div>

                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div className="grid grid-cols-2 gap-4 text-center">
                      <div className="p-4 bg-slate-50 rounded-xl"><div className="text-xs text-slate-500 font-bold">總樣本</div><div className="text-2xl font-bold">{data.meta.totalRespondents}</div></div>
                      <div className="p-4 bg-slate-50 rounded-xl"><div className="text-xs text-slate-500 font-bold">題數</div><div className="text-2xl font-bold">{data.items.length}</div></div>
                    </div>
                  </div>
                </div>

                {/* 右欄 */}
                <div className="lg:col-span-2 flex flex-col gap-6">
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 className="text-xl font-bold mb-4">Kano 模型分佈圖</h2>
                    <div className="h-[500px] w-full"><SharedKanoChart height={500} chartData={chartData} /></div>
                    <div className="mt-6 border-t pt-4">
                      <div className="flex justify-between mb-2">
                        <h3 className="font-bold text-sm flex gap-2">ℹ️ 題目詳細數據與對照</h3>
                        <select value={sortMode} onChange={e => setSortMode(e.target.value)} className="text-xs border rounded p-1 bg-slate-50">
                          <option value="id">依照題號</option>
                          <option value="category">依照屬性</option>
                        </select>
                      </div>
                      <QuestionStatsTable items={dashboardFlatItems} />
                    </div>
                  </div>
                </div>
              </div>
            )}

            {viewMode === 'report' && (
              <div className="max-w-4xl mx-auto">
                <div className="bg-white p-12 shadow-lg min-h-screen" ref={reportRef}>
                  <div className="border-b-2 border-indigo-600 pb-6 mb-12">
                    <h1 className="text-4xl font-bold text-slate-900 mb-4">{reportTitle}</h1>
                    <div className="grid grid-cols-2 gap-4 text-sm text-slate-600">
                      <p><strong>專案：</strong> {projectName}</p>
                      <p><strong>製作人：</strong> {author}</p>
                      <p><strong>日期：</strong> {reportDate}</p>
                      <p><strong>樣本數：</strong> {data.meta?.totalRespondents || 0}</p>
                    </div>
                  </div>
                  <div className="mb-16">
                    <h2 className="text-2xl font-bold text-slate-800 border-l-4 border-emerald-500 pl-4 mb-8 mt-12">一、Kano 屬性分佈圖</h2>
                    <div className="h-[500px] w-full border border-slate-200 rounded-lg p-4"><SharedKanoChart height={460} chartData={chartData} /></div>
                  </div>
                  <div className="mb-16">
                    <h2 className="text-2xl font-bold text-slate-800 border-l-4 border-emerald-500 pl-4 mb-8 mt-12">二、總結與分析</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-0 border border-slate-200 rounded-lg overflow-hidden">
                      <div className="p-6 bg-indigo-50 border-b md:border-b-0 md:border-r border-slate-200">
                        <h3 className="font-bold text-indigo-900 mb-3">📊 總結重點</h3>
                        <p className="text-slate-700 whitespace-pre-wrap leading-relaxed text-sm">{summaryHighlights || '尚無數據可分析。'}</p>
                      </div>
                      <div className="p-6 bg-white">
                        <h3 className="font-bold text-indigo-900 mb-3">🧐 分析原因</h3>
                        <p className="text-slate-700 whitespace-pre-wrap leading-relaxed text-sm">{analysisReason || '尚無數據可分析。'}</p>
                      </div>
                    </div>
                  </div>
                  <div className="mb-16">
                    <h2 className="text-2xl font-bold text-slate-800 border-l-4 border-emerald-500 pl-4 mb-8 mt-12">三、優化教戰守則</h2>
                    <div className="space-y-8">
                      {activeStages.length > 0 ? activeStages.map(stage => (
                        <StageSection key={stage} stage={stage}>
                          {groupedImprovementItems.filter(g => g.stage === stage).map((g, idx) => (
                            <SuggestionCard key={`s${stage}-${idx}`} group={g} />
                          ))}
                        </StageSection>
                      )) : <p className="text-slate-400 italic pl-4">目前數據不足以生成優化建議，請檢查資料分類。</p>}
                    </div>
                  </div>
                  <div className="text-center text-slate-400 text-sm border-t border-slate-100 pt-8">工具製作人：李敏瑞</div>
                </div>
              </div>
            )}

            {viewMode === 'data' && (
              <div className="h-full bg-white rounded-2xl shadow p-4 flex flex-col">
                <div className="flex justify-between mb-4"><span className="font-bold">API JSON 資料</span></div>
                <textarea className="flex-1 bg-slate-900 text-green-400 font-mono p-4 rounded resize-none" value={JSON.stringify(data, null, 2)} readOnly />
              </div>
            )}
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
